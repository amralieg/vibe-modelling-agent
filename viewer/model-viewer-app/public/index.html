<script>
/* ─────────────────────────────────────────────────────────
   MODEL VIEWER - React + Cytoscape.js
   ─────────────────────────────────────────────────────── */
const {useState,useEffect,useRef,useCallback,useMemo,memo} = React;
const h = React.createElement;

// ── Constants ─────────────────────────────────────────────
const DOMAIN_COLORS = [
  '#FF6B6B','#4ECDC4','#45B7D1','#96CEB4','#FFEAA7','#DDA0DD',
  '#98D8C8','#F7DC6F','#BB8FCE','#85C1E9','#F8B500','#00CED1',
  '#FF7F50','#9FE2BF','#DE3163','#40E0D0','#CCCCFF','#FFB347',
  '#77DD77','#AEC6CF','#FDFD96','#836953','#C23B22','#779ECB','#966FD6',
];
const DEFAULT_W = 500, DEFAULT_H = 400;

// ── Graph data extraction ──────────────────────────────────
function extractGraph(dataModel) {
  const nodes = [], edges = [];
  const domainColors = {}, domainStats = {}, domainHierarchy = {};
  let totalAttrs = 0, totalTags = 0;

  const domains = dataModel.domains || [];
  domains.forEach((domain, idx) => {
    const dname = domain.name || `domain_${idx}`;
    const color = DOMAIN_COLORS[idx % DOMAIN_COLORS.length];
    domainColors[dname] = color;

    let dAttr=0, dFk=0, dTag=0, dTbl=0;
    domainHierarchy[dname] = {
      color, description: domain.description||'', division: domain.division||'',
      tables:{}, subdomains:{}
    };

    (domain.products||[]).forEach(product => {
      const tname = product.name||'';
      const fullId = `${dname}.${tname}`;
      const subdomain = product.subdomain||'';
      dTbl++;

      const attrs = product.attributes||[];
      const attrList = attrs.map(a => {
        // Handle tags as string or array; detect primary_key
        const tagsVal = a.tags;
        const isPk = a.primary_key===true || a.primary_key==='true'
          || (typeof tagsVal==='string' && tagsVal.toLowerCase().includes('primary_key'))
          || (Array.isArray(tagsVal) && tagsVal.some(t=>t.toLowerCase().includes('primary_key')));
        const fk = (a.foreign_key_to||'').trim();
        return {
          name: a.name||'', type: a.type||'', fk, pk: isPk,
          desc: a.description||a.desc||'', tags: Array.isArray(tagsVal)?tagsVal: tagsVal?[tagsVal]:[]
        };
      });

      const fkCount = attrList.filter(a=>a.fk).length;
      const tagArr = Array.isArray(product.tags)?product.tags: product.tags?[product.tags]:[];
      dAttr+=attrList.length; dFk+=fkCount; dTag+=tagArr.length;
      totalAttrs+=attrList.length; totalTags+=tagArr.length;

      const tableEntry = {
        full_id:fullId, description:product.description||'', tags:tagArr,
        attributes:attrList, attribute_count:attrList.length, fk_count:fkCount, subdomain
      };
      domainHierarchy[dname].tables[tname] = tableEntry;

      if(subdomain){
        if(!domainHierarchy[dname].subdomains[subdomain])
          domainHierarchy[dname].subdomains[subdomain]={tables:[],attr_count:0,fk_count:0};
        const sd=domainHierarchy[dname].subdomains[subdomain];
        sd.tables.push(tname); sd.attr_count+=attrList.length; sd.fk_count+=fkCount;
      }

      nodes.push({
        data:{id:fullId,label:tname,parent:`domain_${dname}`,type:'table',
              domain:dname,subdomain,attribute_count:attrList.length,
              fk_count:fkCount,tag_count:tagArr.length,color},
        classes:'table-node'
      });

      attrList.forEach(attr=>{
        if(!attr.fk) return;
        const parts=attr.fk.split('.');
        if(parts.length<2) return;
        const targetId=`${parts[0]}.${parts[1]}`;
        const targetCol=parts[2]||`${parts[1]}_id`;
        edges.push({
          data:{
            id:`edge_${fullId}_${targetId}_${attr.name}`,
            source:fullId,target:targetId,label:attr.name,
            source_domain:dname,target_domain:parts[0],
            source_column:attr.name,target_column:targetCol,
            source_table:tname,target_table:parts[1],fk_full:attr.fk
          },
          classes:'fk-edge'
        });
      });
    });

    domainStats[dname]={table_count:dTbl,attr_count:dAttr,fk_count:dFk,tag_count:dTag};
    nodes.push({
      data:{id:`domain_${dname}`,label:dname.toUpperCase(),type:'domain',color,
            division:domain.division||'',table_count:dTbl,attr_count:dAttr,
            fk_count:dFk,tag_count:dTag,width:DEFAULT_W,height:DEFAULT_H},
      classes:'domain-node'
    });
  });

  return {nodes,edges,domainColors,domainStats,domainHierarchy,
          totalAttrs,totalTags,
          modelName:dataModel.name||'Data Model',
          modelVersion:dataModel.version||''};
}

// ── Precompute indexes ─────────────────────────────────────
function buildIndexes(graphData){
  const {nodes,edges}=graphData;
  const tableById={}, domainByName={}, tablesByDomain={};
  const edgesBySource={}, edgesByTarget={}, edgesWithinDomain={};
  nodes.forEach(n=>{
    if(n.classes==='table-node'){
      tableById[n.data.id]=n;
      const d=n.data.domain;
      if(d){(tablesByDomain[d]=tablesByDomain[d]||[]).push(n);}
    } else if(n.classes==='domain-node'){
      const k=n.data.id.replace('domain_','');
      domainByName[k]=n;
    }
  });
  edges.forEach(e=>{
    const s=e.data.source,t=e.data.target;
    (edgesBySource[s]=edgesBySource[s]||[]).push(e);
    (edgesByTarget[t]=edgesByTarget[t]||[]).push(e);
    const sd=s.split('.')[0],td=t.split('.')[0];
    if(sd&&sd===td)(edgesWithinDomain[sd]=edgesWithinDomain[sd]||[]).push(e);
  });
  return {tableById,domainByName,tablesByDomain,edgesBySource,edgesByTarget,edgesWithinDomain};
}

// ── Clustered layout positions ─────────────────────────────
function calcClusteredPositions(nodes, tableArrangement, domainSizes){
  domainSizes=domainSizes||{};
  const domainTables={};
  nodes.forEach(n=>{if(n.classes==='table-node'){const d=n.data.domain||'unknown';(domainTables[d]=domainTables[d]||[]).push(n);}});
  const domainNames=Object.keys(domainTables).sort();
  const numDomains=domainNames.length;
  if(!numDomains) return {};

  // Compute each domain's actual box size
  const boxSizes={};
  domainNames.forEach(dname=>{
    const sz=domainSizes[`domain_${dname}`]||{};
    const tblCount=(domainTables[dname]||[]).length;
    const autoW=Math.max(DEFAULT_W, Math.ceil(Math.sqrt(tblCount))*120);
    const autoH=Math.max(DEFAULT_H, Math.ceil(Math.sqrt(tblCount))*100);
    boxSizes[dname]={w:sz.width||autoW, h:sz.height||autoH};
  });

  // Outer ring: large enough that boxes don't overlap
  const gap=80;
  const circumference=domainNames.reduce((sum,d)=>{
    const diag=Math.sqrt(boxSizes[d].w**2+boxSizes[d].h**2);
    return sum+diag+gap;
  },0);
  let outerR=Math.max(800, circumference/(2*Math.PI));

  const domainCenters={};
  if(numDomains===1){
    domainCenters[domainNames[0]]=[0,0];
  } else {
    domainNames.forEach((dname,i)=>{
      const angle=(2*Math.PI*i/numDomains)-(Math.PI/2);
      domainCenters[dname]=[outerR*Math.cos(angle), outerR*Math.sin(angle)];
    });
  }

  const positions={};
  domainNames.forEach(dname=>{
    const tables=domainTables[dname]||[];
    const [cx,cy]=domainCenters[dname];
    const bw=boxSizes[dname].w, bh=boxSizes[dname].h;
    const pad=40;

    if(tableArrangement==='circle'){
      // Circular arrangement inside the box
      const r=Math.min(bw,bh)/2-pad;
      if(tables.length===1){
        positions[tables[0].data.id]={x:cx,y:cy};
      } else {
        tables.forEach((n,i)=>{
          const a=(2*Math.PI*i/tables.length)-(Math.PI/2);
          positions[n.data.id]={x:cx+r*Math.cos(a), y:cy+r*Math.sin(a)};
        });
      }
    } else {
      // Grid arrangement inside the box
      const usableW=bw-pad*2, usableH=bh-pad*2;
      const cols=Math.max(1,Math.ceil(Math.sqrt(tables.length)));
      const rows=Math.ceil(tables.length/cols);
      const cellW=usableW/cols, cellH=usableH/rows;
      tables.forEach((n,i)=>{
        const col=i%cols, row=Math.floor(i/cols);
        positions[n.data.id]={
          x: cx-usableW/2+cellW/2+col*cellW,
          y: cy-usableH/2+cellH/2+row*cellH
        };
      });
    }
    positions[`domain_${dname}`]={x:cx,y:cy};
  });
  return positions;
}

// ── Domain view positions ──────────────────────────────────
function calcDomainViewPositions(filteredNodes){
  const groups={};
  filteredNodes.forEach(n=>{
    if(n.classes==='table-node'||n.classes==='table-node domain-view-node'){
      const p=n.data.parent||'__ungrouped__';
      (groups[p]=groups[p]||[]).push(n);
    }
  });
  if(!Object.keys(groups).length) return {};
  const sorted=Object.entries(groups).sort((a,b)=>a[0]==='__ungrouped__'?1:b[0]==='__ungrouped__'?-1:a[0].localeCompare(b[0]));
  const ns=80; // spacing between nodes inside a group
  const gap=120; // gap between groups

  // Calculate each group's bounding size
  const groupSizes=sorted.map(([,tables])=>{
    const tc=Math.max(1,Math.ceil(Math.sqrt(tables.length)));
    const tr=Math.ceil(tables.length/tc);
    return {w:tc*ns+gap, h:tr*ns+gap};
  });

  // Place groups in a circle to avoid overlap
  const numGroups=sorted.length;
  if(numGroups===1){
    const tables=sorted[0][1];
    const tc=Math.max(1,Math.ceil(Math.sqrt(tables.length)));
    const positions={};
    tables.forEach((n,i)=>{
      const row=Math.floor(i/tc),col=i%tc;
      positions[n.data.id]={x:(col-(tc-1)/2)*ns, y:(row-(Math.ceil(tables.length/tc)-1)/2)*ns};
    });
    return positions;
  }

  const circumference=groupSizes.reduce((sum,g)=>sum+Math.max(g.w,g.h),0);
  const outerR=Math.max(400, circumference/(2*Math.PI));

  const positions={};
  sorted.forEach(([,tables],gi)=>{
    const angle=(2*Math.PI*gi/numGroups)-(Math.PI/2);
    const cx=outerR*Math.cos(angle), cy=outerR*Math.sin(angle);
    const tc=Math.max(1,Math.ceil(Math.sqrt(tables.length)));
    tables.forEach((n,i)=>{
      const row=Math.floor(i/tc),col=i%tc;
      positions[n.data.id]={x:cx+(col-(tc-1)/2)*ns, y:cy+(row-(Math.ceil(tables.length/tc)-1)/2)*ns};
    });
  });
  return positions;
}

// ── LAYOUT CONFIGS ────────────────────────────────────────
const LAYOUT_CONFIGS={
  circle:{name:'circle',animate:false,fit:true,padding:40,avoidOverlap:true,spacingFactor:1.2},
  concentric:{name:'concentric',animate:false,fit:true,padding:50,avoidOverlap:true,minNodeSpacing:10},
  cose:{name:'cose',animate:false,fit:true,padding:50,nodeRepulsion:5000,idealEdgeLength:50,avoidOverlap:true,randomize:false},
  grid:{name:'grid',animate:false,fit:true,padding:50,avoidOverlap:true,condense:true},
  clustered:{name:'preset',animate:false,fit:true,padding:50},
};

// ── API helpers ────────────────────────────────────────────
async function apiFetch(url){
  const r=await fetch(url);
  if(!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

// ── Tree Component ─────────────────────────────────────────
const TreeNode=memo(({domainName,domainData,expandedDomains,expandedTables,
                      onToggleDomain,onToggleTable,onClickDomain,onClickTable,onClickAttr,searchTerm})=>{
  const {color,tables={},subdomains={},division=''}=domainData;
  const isExpanded=expandedDomains.has(domainName);
  const tableEntries=useMemo(()=>Object.entries(tables).sort((a,b)=>a[0].localeCompare(b[0])),[tables]);
  const st=searchTerm.toLowerCase();
  const domainMatches=!st||domainName.toLowerCase().includes(st);
  const matchingTables=useMemo(()=>!st?tableEntries:tableEntries.filter(([tn])=>tn.toLowerCase().includes(st)),[tableEntries,st]);
  if(st&&!domainMatches&&!matchingTables.length) return null;
  const showTables=isExpanded||(st&&matchingTables.length>0);
  const visibleTables=st?matchingTables:tableEntries;
  const visibleCount=visibleTables.length;
  const divColors={'operations':'#E74C3C','business':'#3498DB','corporate':'#F39C12'};
  const divLower=(division||'').toLowerCase();
  const hasSubs=Object.keys(subdomains).length>0;

  function renderTableRow(tname,tdata,indent){
    const fullId=tdata.full_id||`${domainName}.${tname}`;
    const attrs=tdata.attributes||[];
    const sortedAttrs=[...attrs].sort((a,b)=>a.name.localeCompare(b.name));
    const isTblExp=expandedTables.has(fullId);
    return h('div',{key:fullId,style:{marginLeft:indent,marginBottom:1}},
      h('div',{className:'tree-item',style:{display:'flex',alignItems:'center',padding:'4px 0',cursor:'pointer'}},
        h('button',{
          onClick:e=>{e.stopPropagation();onToggleTable(fullId);},
          style:{width:18,height:18,padding:0,background:'transparent',border:'1px solid #444',
                 borderRadius:3,color:'#aaa',cursor:'pointer',fontSize:12,lineHeight:'14px',
                 marginRight:6,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center'}
        },isTblExp?'−':'+'),
        h('span',{style:{fontSize:10,marginRight:4}},'📊'),
        h('span',{
          style:{fontSize:11,color:'#4ECDC4',cursor:'pointer',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'},
          onClick:()=>onClickTable(fullId)
        },tname),
        h('span',{style:{fontSize:9,color:'#555',marginLeft:5}},'('+sortedAttrs.length+')')

                 marginRight:8,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center'}
        },isExpanded?'−':'+'),
        h('div',{style:{width:12,height:12,background:color,borderRadius:3,marginRight:8,flexShrink:0}}),
        h('span',{
          style:{fontSize:12,color:'#ddd',cursor:'pointer',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1},
          onClick:()=>onClickDomain(domainName)
        },domainName.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase())),

        divColors[divLower]&&h('span',{style:{
          display:'inline-block',padding:'1px 4px',background:divColors[divLower],color:'#fff',

        }},divLower.slice(0,3).toUpperCase())

        ? h('div',{},
            ...Object.keys(subdomains).sort().map(sdname=>{

            }).flat(),

    )

});

// ── Node Info Panel ────────────────────────────────────────
function NodeInfoPanel({selectedNode,selectedEdge,treeClick,graphData,domainSizes,setDomainSizes,filterState}){

          h('span',{style:{fontSize:14,fontWeight:'bold',color:'#fff',display:'block'}},'Relationship'),
          h('span',{style:{fontSize:10,color:'#888'}},`${e.source_table} → ${e.target_table}`)

      h('div',{className:'domain-box',style:{marginBottom:8}},
        h('div',{style:{display:'flex',alignItems:'center',marginBottom:4}},
          h('div',{style:{width:10,height:10,background:srcDomain,borderRadius:'50%',marginRight:6}}),
          h('span',{style:{color:'#4ECDC4',fontSize:11}},'Source: '),

          h('span',{style:{color:'#fff',fontSize:11,marginLeft:4}},e.target_table),

  // Determine what to show

      const [dname,tname]=(treeClick.value||'').split('.');
      const ddata=domainHierarchy[dname]||{};
      nodeData={type:'table',id:treeClick.value,label:tname,domain:dname,
                color:ddata.color||'#888',
                ...((ddata.tables||{})[tname]||{})};
    } else if(nodeType==='domain'){
      const ddata=domainHierarchy[treeClick.value]||{};
      nodeData={type:'domain',id:`domain_${treeClick.value}`,
                label:(treeClick.value||'').toUpperCase(),
                color:ddata.color||'#888',...ddata};
    } else if(nodeType==='attribute'){
      const parts=(treeClick.value||'').split('.');
      const dname=parts[0],tname=parts[1],aname=parts.slice(2).join('.');

      const ainfo=(tdata.attributes||[]).find(a=>a.name===aname)||{};

      const tdata=(ddata.tables||{})[tname]||{};

  // Domain panel
  if(nodeData.type==='domain'){
    const dname=(nodeData.id||'').replace('domain_','')|| nodeData.label||'';

    const viewKey=filterState?`domain:${(filterState.value||'')}`:null;
    const curSizes=(domainSizes||{});

      setDomainSizes(prev=>{

        return{...prev,[vk]:vkSizes};

    return h('div',{style:{padding:'15px',overflowY:'auto',height:'100%',display:'flex',flexDirection:'column'}},
      h('div',{style:{display:'flex',alignItems:'center',marginBottom:15}},
        h('div',{style:{width:20,height:20,background:nodeData.color,borderRadius:4,marginRight:10}}),
        h('span',{style:{fontSize:16,fontWeight:'bold',color:'#fff'}},(dname||'').toUpperCase())
      ),
      h('div',{className:'domain-box',style:{marginBottom:10}},
        h('div',{style:{display:'flex',flexWrap:'wrap',gap:4}},

          h('span',{style:{color:'#FF6B6B',fontSize:11,marginRight:15}},'🔗 '+(dstats.fk_count||0)+' FKs'),
          h('span',{style:{color:'#BB8FCE',fontSize:11}},'🏷️ '+(dstats.tag_count||0)+' tags'),
        )
      ),
      nodeData.description&&h('div',{style:{background:'rgba(0,0,0,0.2)',borderRadius:6,padding:10,marginBottom:10}},
        h('p',{style:{color:'#ccc',fontSize:11,lineHeight:1.6,margin:0}},nodeData.description)
      ),
      Object.keys(subs).length>0&&h('div',{},
        h('div',{className:'section-header'},'Subdomains'),
        ...Object.keys(subs).sort().map(sdname=>{
          const sd=subs[sdname];
          return h('div',{key:sdname,style:{padding:10,background:'rgba(0,0,0,0.3)',borderRadius:6,
                                            borderLeft:`3px solid ${nodeData.color}`,marginBottom:8}},
            h('div',{style:{display:'flex',alignItems:'center',marginBottom:4}},
              h('span',{style:{fontSize:10,color:nodeData.color,marginRight:6}},'◆'),
              h('span',{style:{fontSize:12,fontWeight:600,color:'#fff',flex:1}},sdname.replace(/_/g,' ').replace(/-/g,' ')),
              h('span',{style:{fontSize:10,color:'#fff',background:nodeData.color,borderRadius:10,padding:'1px 7px',fontWeight:'bold'}},''+sd.tables.length)
            ),
            h('div',{style:{fontSize:10,color:'#888',marginBottom:4}},'📋 '+sd.attr_count+' attrs  🔗 '+sd.fk_count+' FKs'),
            h('div',{style:{display:'flex',flexWrap:'wrap'}},
              sd.tables.map(t=>h('span',{key:t,style:{
                display:'inline-block',padding:'2px 7px',background:'rgba(78,205,196,0.15)',
                color:'#4ECDC4',borderRadius:3,fontSize:9,marginRight:4,marginBottom:4,
                border:'1px solid rgba(78,205,196,0.25)'
              }},t))
            )
          );
        })
      )
    );
  }

  // Subdomain panel
  if(nodeData.type==='subdomain'){
    const sdId=nodeData.id||'';
    const parts=sdId.split('_');

    const sdInfo=(ddata.subdomains||{})[sdKey]||{};

      h('div',{style:{display:'flex',alignItems:'center',marginBottom:15}},
        h('span',{style:{fontSize:14,color:nodeData.color,marginRight:10}},'◆'),
        h('div',{},
          h('span',{style:{fontSize:16,fontWeight:'bold',color:'#fff',display:'block'}},(nodeData.label||'').replace(/_/g,' ')),
          h('span',{style:{fontSize:10,color:nodeData.color}},'Subdomain of '+parentDomain.replace(/_/g,' '))
        )
      ),
      h('div',{className:'domain-box',style:{marginBottom:12}},
        h('span',{style:{color:'#4ECDC4',fontSize:11,marginRight:15}},'📊 '+(sdInfo.tables||[]).length+' data products'),
        h('span',{style:{color:'#FFEAA7',fontSize:11,marginRight:15}},'📋 '+(sdInfo.attr_count||0)+' attrs'),
        h('span',{style:{color:'#FF6B6B',fontSize:11}},'🔗 '+(sdInfo.fk_count||0)+' FKs'),

      h('div',{className:'section-header'},'Data Products'),

  // Table panel
  if(nodeData.type==='table'){
    const tname=nodeData.label||(nodeData.id||'').split('.').pop()||'';

    const attrs=nodeData.attributes||[];
    const tags=Array.isArray(nodeData.tags)?nodeData.tags:nodeData.tags?[nodeData.tags]:[];

          const icon=isPk?'🔑 ':isFk?'🔗 ':'• ';

  // Attribute panel

      ),
      nodeData.desc&&h('p',{style:{color:'#ccc',fontSize:12,lineHeight:1.6}},nodeData.desc)
    );
  }
  return null;
}

// ── Main App ──────────────────────────────────────────────
function App(){
  // Graph state
  const [graphData,setGraphData]=useState(null);
  const [graphIndexes,setGraphIndexes]=useState(null);
  const cyRef=useRef(null);
  const containerRef=useRef(null);

  // UI state
  const [layout,setLayout]=useState('circle');
  const [showDomains,setShowDomains]=useState(true);
  const [sizeScale,setSizeScale]=useState(1.0);
  const [filterState,setFilterState]=useState({type:null,value:null});
  const [navHistory,setNavHistory]=useState([]);
  const [domainSizes,setDomainSizes]=useState({});
  const [selectedNode,setSelectedNode]=useState(null);
  const [selectedEdge,setSelectedEdge]=useState(null);
  const [treeClick,setTreeClick]=useState(null);
  const [expandedDomains,setExpandedDomains]=useState(new Set());
  const [expandedTables,setExpandedTables]=useState(new Set());
  const [searchTerm,setSearchTerm]=useState('');
  const [isLoading,setIsLoading]=useState(false);
  const [loadError,setLoadError]=useState(null);
  const [uploadStatus,setUploadStatus]=useState('');

  // Databricks browser state
  // Double-click detection
  const lastTapRef=useRef({});

  // Process model data
  const processModel=useCallback((rawModel,label)=>{
    if(!rawModel){setLoadError('No model data');return;}
    let model=rawModel;
    if(model.model&&model.model_requirements) model=model.model;
    if(!model.domains||!model.domains.length){
      if(model.data_domains&&model.data_domains.length) model.domains=model.data_domains;
    }
    if(!model.domains||!model.domains.length){
      setLoadError('No domains found in model JSON. Expected: { domains: [...] }');
      setIsLoading(false);
      return;
    }
    try{
      const gd=extractGraph(model);
      const idx=buildIndexes(gd);
      setGraphData({...gd,sourceLabel:label});
      setGraphIndexes(idx);
      setFilterState({type:null,value:null});
      setNavHistory([]);
      setLoadError(null);
      setSelectedNode(null);
      setSelectedEdge(null);
      setTreeClick(null);
    }catch(e){
      setLoadError('Error processing model: '+e.message);
    }
    setIsLoading(false);
  },[]);

  // Handle file upload
  const handleUpload=useCallback(e=>{
    const file=e.target.files[0];
    if(!file)return;
    setIsLoading(true);setLoadError(null);setUploadStatus('');
    const sizeMB=(file.size/1048576).toFixed(1);
    setUploadStatus(`Reading ${sizeMB} MB...`);
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        setUploadStatus('Parsing...');
        const data=JSON.parse(ev.target.result);
        // Defer processing so spinner renders
        setTimeout(()=>{
          try{
            processModel(data,file.name);
            setUploadStatus('✓ '+file.name);
          }catch(err){
            setLoadError('Processing error: '+err.message);
            setIsLoading(false);
            setUploadStatus('✗ Error');
          }
        },50);
      }catch(err){
        setLoadError('JSON parse error: '+err.message);
        setIsLoading(false);
        setUploadStatus('✗ Parse error');
      }
    };
    reader.onerror=()=>{
      setLoadError('Failed to read file');
      setIsLoading(false);
      setUploadStatus('✗ Read error');
    };
    reader.readAsText(file);
    e.target.value='';
  },[processModel]);

  // ── Cytoscape mount/destroy ─────────────────────────────
  useEffect(()=>{
    if(!containerRef.current)return;
    const cy=cytoscape({
      container:containerRef.current,
      elements:[],
      style:getStylesheet(true),
      layout:{name:'circle'},
      minZoom:0.01,maxZoom:5,wheelSensitivity:0.3,
      userPanningEnabled:true,userZoomingEnabled:true,
      boxSelectionEnabled:false,
    });
    cyRef.current=cy;

    // Node click
    cy.on('tap','node',e=>{
      const data=e.target.data();
      const now=Date.now();
      const last=lastTapRef.current;
      const isDouble=last.id===data.id&&(now-last.time)<500;
      lastTapRef.current={id:data.id,time:now};
      if(isDouble){
        // Double-click → navigate into node
        if(data.type==='table'){
          navigate({type:'table',value:data.id});
        } else if(data.type==='domain'){
          navigate({type:'domain',value:data.id.replace('domain_','')});
        }
      } else {
        // Single-click → select, show details
        setSelectedNode(data);
        setSelectedEdge(null);
        setTreeClick(null);
        if(data.type==='domain'){
          navigate({type:'domain',value:data.id.replace('domain_','')});
        }
        if(data.type==='table'){
          navigate({type:'table',value:data.id});
        }
      }
    });

    // Edge click
    cy.on('tap','edge',e=>{
      const data=e.target.data();
      setSelectedEdge(data);
      setSelectedNode(null);
      setTreeClick(null);
    });

    // Background click - deselect
    cy.on('tap',e=>{
      if(e.target===cy){
        setSelectedEdge(null);
      }
    });

    return()=>{cy.destroy();cyRef.current=null;};
  },[]);

  // ── Navigation ─────────────────────────────────────────
  const navigate=useCallback((newFilter)=>{
    setFilterState(prev=>{
      if(prev.type) setNavHistory(h=>[...h,prev]);
      return newFilter;
    });
  },[]);

  const goBack=useCallback(()=>{
    setNavHistory(h=>{
      if(!h.length){setFilterState({type:null,value:null});return h;}
      const prev=h[h.length-1];
      setFilterState(prev);
      return h.slice(0,-1);
    });
  },[]);

  // ── Graph elements computation ─────────────────────────
  const graphElements=useMemo(()=>{
    if(!graphData||!graphIndexes) return [];
    const {nodes,edges,domainColors,domainHierarchy}=graphData;
    const {tableById,domainByName,tablesByDomain,edgesBySource,edgesByTarget,edgesWithinDomain}=graphIndexes;
    const {type,value}=filterState;
    const viewKey=type?`${type}:${typeof value==='object'?JSON.stringify(value):value}`:'main';
    const curSizes=(domainSizes[viewKey]||{});

    // Apply domain sizes to domain nodes
    const applyDomainSizes=(els)=>els.map(el=>{
      if(el.data&&el.data.type==='domain'){
        const sz=curSizes[el.data.id]||{};
        return {...el,data:{...el.data,width:sz.width||DEFAULT_W,height:sz.height||DEFAULT_H}};
      }
      return el;
    });

    if(type==='table'&&value){
      const tid=value;
      const outEdges=edgesBySource[tid]||[];
      const inEdges=edgesByTarget[tid]||[];
      const outIds=new Set(outEdges.map(e=>e.data.target));
      const inIds=new Set(inEdges.map(e=>e.data.source));
      const relDomains=new Set();
      const result=[];
      const cn=tableById[tid];
      if(cn){relDomains.add(cn.data.domain);result.push({...cn,data:{...cn.data,parent:undefined},classes:'table-node center-node'});}
      [...outIds,...inIds].filter(id=>id!==tid).forEach(id=>{
        const n=tableById[id];if(!n)return;
        relDomains.add(n.data.domain);
        result.push({...n,data:{...n.data,parent:undefined},classes:outIds.has(id)?'table-node fk-target':'table-node fk-source'});
      });
      // Add domain boxes (visible when Domains toggle is on, hidden by stylesheet when off)
      [...relDomains].filter(Boolean).forEach(d=>{const n=domainByName[d];if(n)result.push(n);});
      outEdges.forEach(e=>result.push({...e,classes:'fk-edge outgoing-edge'}));
      inEdges.forEach(e=>result.push({...e,classes:'fk-edge incoming-edge'}));
      return applyDomainSizes(result);
    }

    if(type==='edge'&&value){
      const ed=typeof value==='object'?value:{};
      const relDomains=new Set();
      const result=[];
      const sn=tableById[ed.source];
      const tn=tableById[ed.target];
      if(sn){relDomains.add(sn.data.domain);result.push({...sn,classes:'table-node fk-source'});}
      if(tn){relDomains.add(tn.data.domain);result.push({...tn,classes:'table-node fk-target'});}
      [...relDomains].filter(Boolean).sort().forEach(d=>{const n=domainByName[d];if(n)result.push(n);});
      (edgesBySource[ed.source]||[]).filter(e=>e.data.target===ed.target&&e.data.source_column===ed.source_column)
        .forEach(e=>result.push({...e,classes:'fk-edge outgoing-edge'}));
      return applyDomainSizes(result);
    }

    if(type==='domain'&&value){
      const dname=value;
      const dh=domainHierarchy[dname]||{};
      const subs=dh.subdomains||{};
      const hasSubs=Object.keys(subs).length>0;
      const domColor=(domainByName[dname]||{data:{}}).data.color||'#888';
      const result=[];
      const subNodeIds=new Set();
      if(hasSubs){
        Object.keys(subs).sort().forEach(sdname=>{
          const sdId=`subdomain_${dname}_${sdname}`;
          subNodeIds.add(sdId);
          result.push({data:{id:sdId,label:sdname.replace(/_/g,' ').replace(/-/g,' '),type:'subdomain',color:domColor},classes:'subdomain-node'});
        });
      } else {
        const dn=domainByName[dname];
        if(dn)result.push(dn);
      }
      const domTables=tablesByDomain[dname]||[];
      domTables.forEach(n=>{
        const sd=n.data.subdomain||'';
        const sdId=hasSubs&&sd?`subdomain_${dname}_${sd}`:'';
        const cloned={...n,classes:'table-node domain-view-node',data:{...n.data}};
        if(hasSubs&&sd&&subNodeIds.has(sdId)) cloned.data.parent=sdId;
        else if(hasSubs) delete cloned.data.parent;
        result.push(cloned);
      });
      (edgesWithinDomain[dname]||[]).forEach(e=>result.push(e));
      const pos=calcDomainViewPositions(result);
      result.forEach(n=>{if(n.data&&pos[n.data.id])n.position=pos[n.data.id];});
      return applyDomainSizes(result);
    }

    if(type==='attribute'&&value){
      const parts=value.split('.');
      if(parts.length<3) return [];
      const [dname,tname,...rest]=parts;
      const aname=rest.join('.');
      const ddata=domainHierarchy[dname]||{};
      const tdata=(ddata.tables||{})[tname]||{};
      const attrs=tdata.attributes||[];
      const ainfo=attrs.find(a=>a.name===aname)||{};
      const domColor=ddata.color||'#4ECDC4';
      const aColor=ainfo.pk?'#FFD700':ainfo.fk?'#FF6B6B':domColor;
      const tid=`${dname}.${tname}`;
      const attrNode={data:{id:`attr_${value}`,label:aname,type:'attribute',color:aColor,domain:dname,table:tname},
                      classes:'attribute-node',position:{x:0,y:0}};
      const result=[attrNode];
      const tn2=tableById[tid];
      if(tn2) result.push({...tn2,classes:'table-node center-node',position:{x:-150,y:0}});
      result.push({data:{id:`attr_edge_${value}`,source:tid,target:`attr_${value}`,label:'has attribute'},classes:'attr-edge'});
      if(ainfo.fk){
        const fkParts=ainfo.fk.split('.');
        if(fkParts.length>=2){
          const fkId=`${fkParts[0]}.${fkParts[1]}`;
          const fkN=tableById[fkId];
          if(fkN){
            result.push({...fkN,classes:'table-node fk-target',position:{x:150,y:0}});
            result.push({data:{id:`fk_edge_${value}`,source:`attr_${value}`,target:fkId,label:'references'},classes:'fk-edge outgoing-edge'});
          }
        }
      }
      return result;
    }

    // Main view — domain boxes auto-sized by table count, tables inside
    const allNodes=nodes.map(n=>{
      if(n.data.type==='domain'){
        const sz=curSizes[n.data.id]||{};
        const dname=n.data.id.replace('domain_','');
        const tblCount=(tablesByDomain[dname]||[]).length;
        const autoW=Math.max(DEFAULT_W, Math.ceil(Math.sqrt(tblCount))*140);
        const autoH=Math.max(DEFAULT_H, Math.ceil(Math.sqrt(tblCount))*120);
        return {...n,data:{...n.data,width:sz.width||autoW,height:sz.height||autoH}};
      }
      return n;
    });
    return [...allNodes,...edges];
  },[graphData,graphIndexes,filterState,domainSizes,layout]);

  // ── Push elements to Cytoscape ─────────────────────────
  useEffect(()=>{
    const cy=cyRef.current;
    if(!cy)return;
    if(!graphData){cy.elements().remove();return;}
    const {type}=filterState;
    try{
    // Filter out edges with missing source/target nodes
    const nodeIds=new Set(graphElements.filter(e=>!e.data.source).map(e=>e.data.id));
    const validElements=graphElements.filter(e=>{
      if(e.data.source&&!nodeIds.has(e.data.source)) return false;
      if(e.data.target&&!nodeIds.has(e.data.target)) return false;
      return true;
    });
    // Batch update
    cy.batch(()=>{
      cy.elements().remove();
      cy.add(validElements);
    });
    // Choose layout strategy
    if(!type && layout==='clustered'){
      const pos=calcClusteredPositions(graphData.nodes, 'grid',
        Object.fromEntries(Object.entries(domainSizes.main||{}).map(([k,v])=>[k,v])));
      cy.nodes().forEach(n=>{if(pos[n.id()])n.position(pos[n.id()]);});
    } else if(!type && layout==='circle'){
      // Circular: free all table nodes from parents, run native circle layout on tables only
      cy.nodes().forEach(n=>{if(n.data('type')!=='domain')n.move({parent:null});});
      cy.nodes('[type="domain"]').style({width:0,height:0,backgroundOpacity:0,borderWidth:0,content:'',padding:0});
      cy.nodes('[type!="domain"]').layout({name:'circle',animate:false,fit:true,padding:60,avoidOverlap:true,spacingFactor:1.5}).run();
    } else if(type==='attribute'||type==='edge'){
      cy.layout({name:'preset',animate:false,fit:true,padding:50}).run();
    } else if(type==='table'){
      cy.layout({name:'concentric',animate:false,fit:true,padding:120,
        avoidOverlap:true,minNodeSpacing:60,spacingFactor:1.5,
        concentric:function(node){return node.hasClass('center-node')?2:1;},
        levelWidth:function(){return 1;}
      }).run();
    } else {
      // Other layouts (cose, concentric, grid) or domain sub-views
      const layoutCfg={...(LAYOUT_CONFIGS[layout]||LAYOUT_CONFIGS.circle)};
      cy.layout(layoutCfg).run();
    }
    // Fit to screen — multiple passes to handle large graphs that settle slowly
    const doFit=()=>{cy.fit(60);if(cy.zoom()>1.5)cy.zoom(1.5);cy.center();};
    setTimeout(doFit,200);
    setTimeout(doFit,1000);
    setTimeout(doFit,3000);
    }catch(e){console.error('Cytoscape layout error:',e);}
  },[graphElements,layout,filterState,graphData,domainSizes]);

  // ── Update stylesheet when showDomains or sizeScale changes ─────
  useEffect(()=>{
    const cy=cyRef.current;
    if(!cy)return;
    cy.style(getStylesheet(showDomains,sizeScale));
    setTimeout(()=>cy.fit(50),50);
  },[showDomains,sizeScale]);

  // ── Stats ──────────────────────────────────────────────
  const statsText=useMemo(()=>{
    if(!graphData)return '';
    const {modelName,modelVersion,domainColors,nodes,edges,totalAttrs,totalTags,sourceLabel}=graphData;
    const domCount=Object.keys(domainColors).length;
    const tblCount=nodes.filter(n=>n.classes==='table-node').length;
    const {type,value}=filterState;
    if(type==='table'&&value){
      const tname=(value||'').split('.').pop();
      return `${modelName} • FK: ${tname}`;
    }
    if(type==='domain'&&value) return `Domain: ${value}`;
    if(type==='edge') return `${modelName} • Link View`;
    if(type==='attribute'&&value) return `${modelName} • Attr: ${(value||'').split('.').pop()}`;
    return `${domCount} domains, ${tblCount} products, ${totalAttrs} attributes`;
  },[graphData,filterState]);

  const filterInfoText=useMemo(()=>{
    if(!graphData||!filterState.type) return '';
    const {type,value}=filterState;
    const {edgesBySource,edgesByTarget}=graphIndexes||{};
    if(type==='table'&&value){
      const out=(edgesBySource||{})[value]?.length||0;
      const inn=(edgesByTarget||{})[value]?.length||0;
      return `🔗 ${out} out, ${inn} in`;
    }
    if(type==='domain'&&value) return `Domain: ${value}`;
    if(type==='edge'&&typeof value==='object') return `🔗 ${(value.source||'').split('.').pop()}.${value.source_column||''} → ${(value.target||'').split('.').pop()}.${value.target_column||''}`;
    if(type==='attribute'&&value) return `📊 ${(value||'').split('.').slice(1).join('.')}`;
    return '';
  },[graphData,graphIndexes,filterState]);

  const modelBadge=useMemo(()=>{
    if(!graphData||filterState.type) return '';
    const {modelName,modelVersion}=graphData;
    return modelVersion?`${modelName} ${modelVersion}`:modelName;
  },[graphData,filterState]);

  // Tree interaction
  const handleToggleDomain=useCallback(dname=>{
    setExpandedDomains(s=>{const ns=new Set(s);ns.has(dname)?ns.delete(dname):ns.add(dname);return ns;});
  },[]);
  const handleToggleTable=useCallback(fid=>{
    setExpandedTables(s=>{const ns=new Set(s);ns.has(fid)?ns.delete(fid):ns.add(fid);return ns;});
  },[]);
  const handleClickDomain=useCallback(dname=>{
    setTreeClick({type:'domain',value:dname});
    setSelectedNode(null);setSelectedEdge(null);
    navigate({type:'domain',value:dname});
  },[navigate]);
  const handleClickTable=useCallback(fid=>{
    setTreeClick({type:'table',value:fid});
    setSelectedNode(null);setSelectedEdge(null);
    navigate({type:'table',value:fid});
  },[navigate]);
  const handleClickAttr=useCallback(aid=>{
    setTreeClick({type:'attribute',value:aid});
    setSelectedNode(null);setSelectedEdge(null);
    navigate({type:'attribute',value:aid});
  },[navigate]);

  const sortedDomains=useMemo(()=>{
    if(!graphData) return [];
    return Object.entries(graphData.domainHierarchy||{}).sort((a,b)=>a[0].localeCompare(b[0]));
  },[graphData]);

  const btnStyle={padding:'8px 12px',background:'#444',color:'#fff',border:'none',borderRadius:4,cursor:'pointer',fontSize:12,marginRight:6};

  return h('div',{style:{display:'flex',flexDirection:'column',height:'100vh',background:'#0f0f1a',color:'#fff',overflow:'hidden'}},

    // ── Top toolbar ──────────────────────────────────────
    h('div',{style:{display:'flex',alignItems:'center',
                    padding:'8px 16px',background:'linear-gradient(135deg,#1a1a2e 0%,#16213e 100%)',
                    borderBottom:'1px solid #333',flexShrink:0,gap:10,flexWrap:'wrap'}},
      // Title
      h('div',{style:{display:'flex',alignItems:'center',gap:8,marginRight:4}},
        h('h1',{style:{margin:0,fontSize:18,fontWeight:600,color:'#fff',whiteSpace:'nowrap'}},'Model Viewer')
      ),
      // Model summary stats
      graphData&&h('div',{style:{display:'flex',alignItems:'center',gap:12,marginLeft:4}},
        h('div',{style:{width:1,height:28,background:'#444',flexShrink:0}}),
        h('span',{style:{color:'#4ECDC4',fontSize:11,whiteSpace:'nowrap'}},
          Object.keys(graphData.domainColors||{}).length+' Domains'),
        h('span',{style:{color:'#FFEAA7',fontSize:11,whiteSpace:'nowrap'}},
          graphData.nodes.filter(n=>n.classes==='table-node').length+' Products'),
        h('span',{style:{color:'#BB8FCE',fontSize:11,whiteSpace:'nowrap'}},
          (graphData.totalAttrs||0)+' Attributes'),
        h('span',{style:{color:'#FF6B6B',fontSize:11,whiteSpace:'nowrap'}},
          graphData.edges.length+' FKs')
      ),
      // Right controls
      h('div',{style:{display:'flex',alignItems:'center',gap:4,marginLeft:'auto',flexWrap:'wrap'}},
        h('label',{style:{...btnStyle,background:'#4ECDC4',cursor:'pointer',display:'inline-block',margin:0,padding:'6px 10px',borderRadius:4,fontSize:11}},
          'Upload JSON',
          h('input',{type:'file',accept:'.json',style:{display:'none'},onChange:handleUpload})
        ),
        uploadStatus&&h('span',{style:{color:'#4ECDC4',fontSize:10,marginRight:4}},uploadStatus),
        h('button',{style:{...btnStyle,padding:'6px 10px'},onClick:()=>cyRef.current&&cyRef.current.zoom(cyRef.current.zoom()*0.8)},'−'),
        h('button',{style:{...btnStyle,padding:'6px 10px'},onClick:()=>cyRef.current&&cyRef.current.zoom(cyRef.current.zoom()*1.25)},'+'),
        h('button',{style:{...btnStyle,padding:'6px 10px'},title:'Decrease node/font size',
          onClick:()=>setSizeScale(s=>Math.max(0.5,s-0.2))},'F−'),
        h('button',{style:{...btnStyle,padding:'6px 10px'},title:'Increase node/font size',
          onClick:()=>setSizeScale(s=>Math.min(3,s+0.2))},'F+'),
        h('button',{style:{...btnStyle,padding:'6px 10px'},onClick:()=>cyRef.current&&cyRef.current.fit(50)},'Fit'),
        h('button',{style:{...btnStyle,padding:'6px 10px'},onClick:()=>{
          setFilterState({type:null,value:null});setNavHistory([]);
          setTimeout(()=>cyRef.current&&cyRef.current.fit(50),100);
        }},'Reset'),
        h('div',{style:{display:'flex',alignItems:'center',marginLeft:4}},
          h('label',{style:{color:'#aaa',fontSize:10,marginRight:4}},'Domains'),
          h('input',{type:'checkbox',checked:showDomains,onChange:e=>setShowDomains(e.target.checked),style:{cursor:'pointer'}})
        ),
        h('select',{value:layout,onChange:e=>setLayout(e.target.value),style:{fontSize:11}},
          h('option',{value:'circle'},'Circular'),
          h('option',{value:'cose'},'Force (Cose)'),
          h('option',{value:'concentric'},'Concentric'),
          h('option',{value:'clustered'},'Clustered'),
          h('option',{value:'grid'},'Grid')
        )
      )
    ),

    // ── Main body ────────────────────────────────────────
    h('div',{style:{display:'flex',flex:1,overflow:'hidden'}},

      // Left sidebar
      h('div',{style:{width:250,background:'#1a1a2e',borderRight:'1px solid #333',
                      display:'flex',flexDirection:'column',flexShrink:0}},
        h('div',{style:{padding:'15px 15px 0',flexShrink:0}},
          h('h3',{style:{margin:'0 0 3px',fontSize:14,color:'#fff'}},
            graphData?(graphData.modelVersion?`${graphData.modelName} ${graphData.modelVersion}`:graphData.modelName):'Data Model'
          ),
          graphData&&h('span',{style:{color:'#888',fontSize:11,display:'block',marginBottom:10,
                                      paddingBottom:10,borderBottom:'1px solid #444'}},
            statsText
          ),
          h('input',{type:'text',placeholder:'Search domains, tables...',
                     value:searchTerm,onChange:e=>setSearchTerm(e.target.value),
                     style:{marginBottom:6}})
        ),
        h('p',{style:{color:'#666',fontSize:10,margin:'0 15px 6px',padding:0}},'Click + to expand, click name to view'),
        h('div',{style:{flex:1,overflowY:'auto',padding:'0 15px 15px'}},
          !graphData&&h('div',{style:{textAlign:'center',paddingTop:30}},
            h('div',{style:{fontSize:32,marginBottom:10}},'📊'),
            h('p',{style:{color:'#666',fontSize:12}},'Upload or load a model to begin')
          ),
          graphData&&sortedDomains.map(([dname,ddata])=>
            h(TreeNode,{key:dname,domainName:dname,domainData:ddata,
                        expandedDomains,expandedTables,searchTerm,
                        onToggleDomain:handleToggleDomain,onToggleTable:handleToggleTable,
                        onClickDomain:handleClickDomain,onClickTable:handleClickTable,
                        onClickAttr:handleClickAttr})
          )
        )
      ),

      // Graph area
      h('div',{style:{flex:1,position:'relative',background:'#0f0f1a',
                      backgroundImage:'radial-gradient(circle at 1px 1px,#222 1px,transparent 0)',
                      backgroundSize:'40px 40px'}},

        // Back button
        navHistory.length>0&&h('button',{
          onClick:goBack,
          style:{position:'absolute',top:15,left:15,zIndex:1000,padding:'10px 20px',
                 background:'#FF6B6B',color:'#fff',border:'none',borderRadius:6,
                 cursor:'pointer',fontSize:13,fontWeight:600,boxShadow:'0 2px 10px rgba(0,0,0,0.3)'}
        },'← Back'),

        // Filter info badge
        filterInfoText&&h('div',{style:{position:'absolute',top:15,right:15,zIndex:1000,
                                        padding:'8px 15px',background:'rgba(247,220,111,0.9)',
                                        color:'#333',borderRadius:6,fontSize:12,fontWeight:600}},
          filterInfoText),

        // Model name badge (main view only)
        modelBadge&&h('div',{style:{position:'absolute',top:15,right:15,zIndex:1000,
                                     padding:'8px 15px',background:'rgba(78,205,196,0.9)',
                                     color:'#fff',borderRadius:6,fontSize:12,fontWeight:600}},
          modelBadge),

        // Empty state
        !graphData&&!isLoading&&!loadError&&h('div',{style:{position:'absolute',top:0,left:0,right:0,bottom:0,
                                                             display:'flex',alignItems:'center',justifyContent:'center',zIndex:500}},
          h('div',{style:{textAlign:'center'}},
            h('div',{style:{fontSize:48,marginBottom:15}},'📊'),
            h('p',{style:{color:'#888',fontSize:14}},'Upload a JSON file or load from Databricks')
          )
        ),

        // Loading overlay
        isLoading&&h('div',{style:{position:'absolute',top:0,left:0,right:0,bottom:0,
                                    background:'rgba(15,15,26,0.85)',zIndex:998,
                                    display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column'}},
          h('div',{style:{color:'#BB8FCE',fontSize:13,marginBottom:16}},'Loading model...'),
          h('div',{className:'spinner'})
        ),

        // Error display
        loadError&&h('div',{style:{position:'absolute',top:'50%',left:'50%',
                                    transform:'translate(-50%,-50%)',maxWidth:600,width:'90%',zIndex:1001}},
          h('div',{style:{background:'#1a1a2e',padding:30,borderRadius:12,border:'1px solid #333',textAlign:'center',boxShadow:'0 10px 40px rgba(0,0,0,0.5)'}},
            h('div',{style:{fontSize:48,marginBottom:15}},'⚠️'),
            h('h2',{style:{color:'#FF6B6B',fontSize:20,marginBottom:15}},'Failed to Load Data Model'),
            h('div',{style:{fontSize:13,background:'rgba(255,107,107,0.15)',padding:15,borderRadius:8,
                             border:'2px solid #FF6B6B',textAlign:'left',wordBreak:'break-word',marginBottom:20}},
              h('strong',{style:{color:'#FF6B6B'}},'Error: '),h('span',{style:{color:'#FFB347'}},loadError)
            ),
            h('button',{style:{...btnStyle,background:'#FF6B6B',marginRight:0},onClick:()=>setLoadError(null)},'Dismiss')
          )
        ),

        // Cytoscape container
        h('div',{ref:containerRef,style:{width:'100%',height:'100%',display:graphData?'block':'none'}})
      ),

      // Right panel
      h('div',{style:{width:280,background:'#1a1a2e',borderLeft:'1px solid #333',
                      display:'flex',flexDirection:'column',flexShrink:0,overflowY:'auto'}},
        h(NodeInfoPanel,{
          selectedNode:treeClick?null:selectedNode,
          selectedEdge:treeClick?null:selectedEdge,
          treeClick,graphData,
          domainSizes,setDomainSizes,filterState
        })
      )
    ),

    // Version badge
    h('div',{style:{position:'fixed',bottom:10,right:14,zIndex:3000,
                    padding:'4px 10px',background:'rgba(0,0,0,0.6)',border:'1px solid #444',
                    borderRadius:12,fontSize:11,color:'#bbb'}},'v1.0')
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App,null));
</script>
</body>
</html>
